name: testnet-readiness

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  GOFLAGS: "-p=1"
  AETRA_BINARY: build/aetrad.exe

jobs:
  go-test-all:
    name: go test ./...
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: go test ./...
        shell: pwsh
        run: go test ./...

  linter:
    name: linter
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - uses: bufbuild/buf-setup-action@v1
      - name: go vet ./... && buf lint
        shell: pwsh
        run: |
          go vet ./...
          buf lint

  chain-id-validation:
    name: chain-id validation
    runs-on: windows-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Validate chain-id policy
        shell: pwsh
        run: |
          # ValidateAetraTestnetChainID
          go test ./app/params ./cmd/l1d/cmd -run "ChainID|TestnetInitRejectsMalformedChainID" -count=1

  build-aetrad:
    name: build aetrad
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Build node binary
        shell: pwsh
        run: ./scripts/build-aetrad.ps1 -Binary $env:AETRA_BINARY -SkipModVerify
      - name: Upload aetrad binary
        uses: actions/upload-artifact@v4
        with:
          name: aetrad-windows-amd64
          path: ${{ env.AETRA_BINARY }}
          if-no-files-found: error
          retention-days: 1

  version-command:
    name: node binary version command
    runs-on: windows-latest
    timeout-minutes: 10
    needs:
      - build-aetrad
    steps:
      - uses: actions/checkout@v4
      - name: Download aetrad binary
        uses: actions/download-artifact@v4
        with:
          name: aetrad-windows-amd64
          path: build
      - name: aetrad version --long --output json
        shell: pwsh
        run: |
          if (!(Test-Path $env:AETRA_BINARY)) { throw "missing $env:AETRA_BINARY" }
          ./build/aetrad.exe version --long --output json

  genesis-validate:
    name: genesis validate
    runs-on: windows-latest
    timeout-minutes: 20
    needs:
      - build-aetrad
    steps:
      - uses: actions/checkout@v4
      - name: Download aetrad binary
        uses: actions/download-artifact@v4
        with:
          name: aetrad-windows-amd64
          path: build
      - name: Verify downloaded binary
        shell: pwsh
        run: if (!(Test-Path $env:AETRA_BINARY)) { throw "missing $env:AETRA_BINARY" }
      - name: scripts/localnet/validate-genesis.ps1
        shell: pwsh
        run: ./scripts/localnet/validate-genesis.ps1 -Binary $env:AETRA_BINARY -ChainId aetra-local-1 -ValidatorCount 3

  invariants:
    name: invariants
    runs-on: windows-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: go test ./app -run Invariant
        shell: pwsh
        run: go test ./app -run Invariant -count=1

  localnet-smoke:
    name: localnet smoke
    runs-on: windows-latest
    timeout-minutes: 45
    needs:
      - genesis-validate
      - build-aetrad
    steps:
      - uses: actions/checkout@v4
      - name: Download aetrad binary
        uses: actions/download-artifact@v4
        with:
          name: aetrad-windows-amd64
          path: build
      - name: tests/e2e/localnet_smoke.ps1
        shell: pwsh
        run: |
          if (!(Test-Path $env:AETRA_BINARY)) { throw "missing $env:AETRA_BINARY" }
          ./tests/e2e/localnet_smoke.ps1 -Binary $env:AETRA_BINARY -ChainId aetra-local-1 -ValidatorCount 3 -SkipBuild

  export-import-roundtrip:
    name: export/import roundtrip
    runs-on: windows-latest
    timeout-minutes: 55
    needs:
      - genesis-validate
      - build-aetrad
    steps:
      - uses: actions/checkout@v4
      - name: Download aetrad binary
        uses: actions/download-artifact@v4
        with:
          name: aetrad-windows-amd64
          path: build
      - name: tests/e2e/export_import_smoke.ps1
        shell: pwsh
        run: |
          if (!(Test-Path $env:AETRA_BINARY)) { throw "missing $env:AETRA_BINARY" }
          ./tests/e2e/export_import_smoke.ps1 -Binary $env:AETRA_BINARY -ChainId aetra-local-1 -ValidatorCount 3

  validator-docs:
    name: validator documentation minimum
    runs-on: windows-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: docs/validator-onboarding.md
        shell: pwsh
        run: go test ./app/params -run "ValidatorDocumentation|TestnetReadinessWorkflow" -count=1

  release-artifact-build:
    name: release artifact
    runs-on: windows-latest
    timeout-minutes: 35
    needs:
      - go-test-all
      - linter
      - chain-id-validation
      - invariants
      - validator-docs
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: scripts/release/prototype-package.ps1
        shell: pwsh
        run: ./scripts/release/prototype-package.ps1 -Version testnet-readiness-${{ github.sha }} -TargetOS windows -TargetArch amd64
      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: aetra-testnet-readiness-windows-amd64
          path: dist/prototype/**
