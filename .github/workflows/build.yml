name: Build

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  orbitalisd-windows:
    name: orbitalisd windows amd64
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build orbitalisd
        shell: pwsh
        run: .\scripts\build-orbitalisd.ps1 -Force

      - name: Test
        shell: pwsh
        run: go test ./...

      - name: Vet
        shell: pwsh
        run: go vet ./...

      - name: Version metadata
        shell: pwsh
        run: .\build\orbitalisd.exe version --long --output json
