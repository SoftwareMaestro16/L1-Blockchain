name: Security Gate

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * 1"

permissions:
  contents: read
  pull-requests: read
  security-events: write

jobs:
  govulncheck:
    name: govulncheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        shell: bash
        run: |
          set +e
          govulncheck ./... 2>&1 | tee govulncheck.txt
          govuln_status=${PIPESTATUS[0]}
          set -e

          if [[ "${govuln_status}" -eq 0 ]]; then
            exit 0
          fi

          mapfile -t findings < <(grep -E '^Vulnerability #[0-9]+: GO-[0-9]+-[0-9]+' govulncheck.txt | awk '{print $3}' | sort -u)
          mapfile -t triaged < <(grep -E '^GO-[0-9]+-[0-9]+' .github/security/govulncheck-triage.txt | sort -u)

          if [[ "${#findings[@]}" -eq 0 ]]; then
            printf 'govulncheck failed without parseable GO advisory IDs.\n'
            exit "${govuln_status}"
          fi

          untriaged=()
          for finding in "${findings[@]}"; do
            if ! printf '%s\n' "${triaged[@]}" | grep -qx "${finding}"; then
              untriaged+=("${finding}")
            fi
          done

          if [[ "${#untriaged[@]}" -gt 0 ]]; then
            printf 'Untriaged govulncheck findings:\n'
            printf '  %s\n' "${untriaged[@]}"
            exit 1
          fi

          printf 'govulncheck reported only triaged findings:\n'
          printf '  %s\n' "${findings[@]}"

  gosec:
    name: gosec high severity
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install gosec
        run: go install github.com/securego/gosec/v2/cmd/gosec@latest

      - name: Run gosec
        run: |
          mapfile -t package_dirs < <(go list -f '{{.Dir}}' ./...)
          gosec -exclude-generated -severity high -confidence medium -fmt sarif -out gosec.sarif "${package_dirs[@]}"

      - name: Upload gosec SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: gosec.sarif

  gitleaks:
    name: gitleaks secrets
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  dependency-review:
    name: dependency review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Review dependency changes
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high

  codeql:
    name: CodeQL
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: go

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Analyze
        uses: github/codeql-action/analyze@v3
