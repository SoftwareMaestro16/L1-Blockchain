syntax = "proto3";
package l1.storagerent.v1;

option go_package = "github.com/sovereign-l1/l1/x/storage-rent/types";

message StorageRentParams {
  uint64 rent_rate_per_byte_block = 1;
  uint64 free_storage_allowance = 2;
  uint64 retention_blocks = 3;
  uint64 unfreeze_buffer_blocks = 4;
  uint32 max_contracts = 5;
  uint32 max_exemptions = 6;
  string fee_collector_account = 7;
  string treasury_account = 8;
  uint32 fee_collector_share = 9;
  uint32 treasury_share = 10;
  uint32 burn_share = 11;
  uint64 rent_rate_per_byte_second = 12;
}

message ContractRentRecord {
  string contract_address = 1;
  string actor_id = 2;
  uint64 storage_bytes = 3;
  uint64 prepaid_rent_balance = 4;
  uint64 rent_debt = 5;
  uint64 last_charged_height = 6;
  string status = 7;
  uint64 freeze_height = 8;
  uint64 deletion_eligibility_height = 9;
  string archival_proof_root = 10;
  bool exempt = 11;
}

message RentDistributionRecord {
  string contract_address = 1;
  uint64 height = 2;
  uint64 amount = 3;
  uint64 fee_collector_amount = 4;
  uint64 treasury_amount = 5;
  uint64 burn_amount = 6;
}

message RentExemption {
  string account = 1;
  string reason = 2;
}

message StorageRentState {
  repeated ContractRentRecord contracts = 1;
  repeated RentDistributionRecord distributions = 2;
  repeated RentExemption exemptions = 3;
}

message GenesisState {
  uint64 version = 1;
  StorageRentParams rent_params = 2;
  StorageRentState state = 3;
}
