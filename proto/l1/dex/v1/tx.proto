syntax = "proto3";
package l1.dex.v1;

import "amino/amino.proto";
import "cosmos/base/v1beta1/coin.proto";
import "cosmos/msg/v1/msg.proto";
import "cosmos_proto/cosmos.proto";
import "gogoproto/gogo.proto";
import "l1/dex/v1/genesis.proto";

option go_package = "github.com/sovereign-l1/l1/x/dex/types";

service Msg {
  option (cosmos.msg.v1.service) = true;

  rpc CreatePool(MsgCreatePool) returns (MsgCreatePoolResponse);
  rpc AddLiquidity(MsgAddLiquidity) returns (MsgAddLiquidityResponse);
  rpc RemoveLiquidity(MsgRemoveLiquidity) returns (MsgRemoveLiquidityResponse);
  rpc SwapExactAmountIn(MsgSwapExactAmountIn) returns (MsgSwapExactAmountInResponse);
  rpc UpdateParams(MsgUpdateParams) returns (MsgUpdateParamsResponse);
}

message MsgCreatePool {
  option (cosmos.msg.v1.signer) = "creator";
  option (amino.name) = "l1/dex/MsgCreatePool";

  string creator = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  cosmos.base.v1beta1.Coin token_a = 2 [(gogoproto.nullable) = false];
  cosmos.base.v1beta1.Coin token_b = 3 [(gogoproto.nullable) = false];
}

message MsgCreatePoolResponse {
  uint64 pool_id = 1;
  string lp_denom = 2;
  cosmos.base.v1beta1.Coin minted_shares = 3 [(gogoproto.nullable) = false];
}

message MsgAddLiquidity {
  option (cosmos.msg.v1.signer) = "depositor";
  option (amino.name) = "l1/dex/MsgAddLiquidity";

  string depositor = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  uint64 pool_id = 2;
  cosmos.base.v1beta1.Coin token_a = 3 [(gogoproto.nullable) = false];
  cosmos.base.v1beta1.Coin token_b = 4 [(gogoproto.nullable) = false];
  string min_shares = 5;
}

message MsgAddLiquidityResponse {
  cosmos.base.v1beta1.Coin minted_shares = 1 [(gogoproto.nullable) = false];
}

message MsgRemoveLiquidity {
  option (cosmos.msg.v1.signer) = "withdrawer";
  option (amino.name) = "l1/dex/MsgRemoveLiquidity";

  string withdrawer = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  uint64 pool_id = 2;
  cosmos.base.v1beta1.Coin shares = 3 [(gogoproto.nullable) = false];
}

message MsgRemoveLiquidityResponse {
  cosmos.base.v1beta1.Coin token_a = 1 [(gogoproto.nullable) = false];
  cosmos.base.v1beta1.Coin token_b = 2 [(gogoproto.nullable) = false];
}

message MsgSwapExactAmountIn {
  option (cosmos.msg.v1.signer) = "trader";
  option (amino.name) = "l1/dex/MsgSwapExactAmountIn";

  string trader = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  uint64 pool_id = 2;
  cosmos.base.v1beta1.Coin token_in = 3 [(gogoproto.nullable) = false];
  string token_out_denom = 4;
  string min_amount_out = 5;
}

message MsgSwapExactAmountInResponse {
  cosmos.base.v1beta1.Coin token_out = 1 [(gogoproto.nullable) = false];
}

message MsgUpdateParams {
  option (cosmos.msg.v1.signer) = "authority";
  option (amino.name) = "l1/dex/MsgUpdateParams";

  string authority = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  Params params = 2 [(gogoproto.nullable) = false];
}

message MsgUpdateParamsResponse {}
