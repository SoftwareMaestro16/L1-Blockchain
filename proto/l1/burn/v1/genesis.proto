syntax = "proto3";
package l1.burn.v1;

import "cosmos/base/v1beta1/coin.proto";
import "gogoproto/gogo.proto";

option go_package = "github.com/sovereign-l1/l1/x/burn/types";

message GenesisState {
  Params params = 1 [(gogoproto.nullable) = false];
  repeated BurnedByDenomEntry burned_by_denom = 2 [(gogoproto.nullable) = false];
  repeated BurnedByEpochEntry burned_by_epoch = 3 [(gogoproto.nullable) = false];
  repeated BurnReason burn_reasons = 4 [(gogoproto.nullable) = false];
}

message Params {
  repeated string allowed_denoms = 1;
  repeated BurnPermission protocol_burn_permissions = 2 [(gogoproto.nullable) = false];
  uint32 max_reason_bytes = 3;
}

message BurnPermission {
  string module_name = 1;
  repeated string allowed_denoms = 2;
}

message BurnedByDenomEntry {
  string denom = 1;
  repeated cosmos.base.v1beta1.Coin amount = 2 [
    (gogoproto.nullable) = false,
    (gogoproto.castrepeated) = "github.com/cosmos/cosmos-sdk/types.Coins"
  ];
}

message BurnedByEpochEntry {
  uint64 epoch = 1;
  repeated cosmos.base.v1beta1.Coin amount = 2 [
    (gogoproto.nullable) = false,
    (gogoproto.castrepeated) = "github.com/cosmos/cosmos-sdk/types.Coins"
  ];
}

message BurnReason {
  uint64 id = 1;
  uint64 epoch = 2;
  string burner = 3;
  string source_module = 4;
  repeated cosmos.base.v1beta1.Coin amount = 5 [
    (gogoproto.nullable) = false,
    (gogoproto.castrepeated) = "github.com/cosmos/cosmos-sdk/types.Coins"
  ];
  string reason = 6;
  int64 height = 7;
  bool protocol = 8;
}
