syntax = "proto3";
package l1.tokenfactory.v1;

import "amino/amino.proto";
import "cosmos/base/v1beta1/coin.proto";
import "cosmos/msg/v1/msg.proto";
import "cosmos_proto/cosmos.proto";
import "gogoproto/gogo.proto";
import "l1/tokenfactory/v1/genesis.proto";

option go_package = "github.com/sovereign-l1/l1/x/tokenfactory/types";

service Msg {
  option (cosmos.msg.v1.service) = true;

  rpc CreateDenom(MsgCreateDenom) returns (MsgCreateDenomResponse);
  rpc Mint(MsgMint) returns (MsgMintResponse);
  rpc Burn(MsgBurn) returns (MsgBurnResponse);
  rpc ChangeAdmin(MsgChangeAdmin) returns (MsgChangeAdminResponse);
  rpc UpdateParams(MsgUpdateParams) returns (MsgUpdateParamsResponse);
}

message MsgCreateDenom {
  option (cosmos.msg.v1.signer) = "creator";
  option (amino.name) = "l1/tokenfactory/MsgCreateDenom";

  string creator = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  string subdenom = 2;
}

message MsgCreateDenomResponse {
  string new_token_denom = 1;
}

message MsgMint {
  option (cosmos.msg.v1.signer) = "sender";
  option (amino.name) = "l1/tokenfactory/MsgMint";

  string sender = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  cosmos.base.v1beta1.Coin amount = 2 [(gogoproto.nullable) = false];
  string mint_to_address = 3 [(cosmos_proto.scalar) = "cosmos.AddressString"];
}

message MsgMintResponse {}

message MsgBurn {
  option (cosmos.msg.v1.signer) = "sender";
  option (amino.name) = "l1/tokenfactory/MsgBurn";

  string sender = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  cosmos.base.v1beta1.Coin amount = 2 [(gogoproto.nullable) = false];
  string burn_from_address = 3 [(cosmos_proto.scalar) = "cosmos.AddressString"];
}

message MsgBurnResponse {}

message MsgChangeAdmin {
  option (cosmos.msg.v1.signer) = "sender";
  option (amino.name) = "l1/tokenfactory/MsgChangeAdmin";

  string sender = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  string denom = 2;
  string new_admin = 3 [(cosmos_proto.scalar) = "cosmos.AddressString"];
}

message MsgChangeAdminResponse {}

message MsgUpdateParams {
  option (cosmos.msg.v1.signer) = "authority";
  option (amino.name) = "l1/tokenfactory/MsgUpdateParams";

  string authority = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  Params params = 2 [(gogoproto.nullable) = false];
}

message MsgUpdateParamsResponse {}
