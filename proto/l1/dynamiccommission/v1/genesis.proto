syntax = "proto3";
package l1.dynamiccommission.v1;

import "gogoproto/gogo.proto";

option go_package = "github.com/sovereign-l1/l1/x/dynamic-commission/types";

message GenesisState {
  Params params = 1 [(gogoproto.nullable) = false];
  repeated ValidatorCommission commissions = 2 [(gogoproto.nullable) = false];
  repeated CommissionHistoryEntry commission_history = 3 [(gogoproto.nullable) = false];
}

message Params {
  uint32 commission_floor_bps = 1;
  uint32 commission_ceiling_bps = 2;
  uint32 max_rate_change_bps = 3;
  uint32 high_performance_threshold_bps = 4;
  uint32 low_performance_threshold_bps = 5;
  uint32 high_reputation_threshold_bps = 6;
  uint32 low_reputation_threshold_bps = 7;
  uint32 performance_bonus_bps = 8;
  uint32 performance_penalty_bps = 9;
  uint32 reputation_bonus_bps = 10;
  uint32 reputation_penalty_bps = 11;
}

message ValidatorCommission {
  string validator_address = 1;
  uint32 base_commission_bps = 2;
  uint32 effective_commission_bps = 3;
  int32 performance_modifier_bps = 4;
  int32 reputation_modifier_bps = 5;
  uint32 commission_floor_bps = 6;
  uint32 commission_ceiling_bps = 7;
  uint64 last_update_height = 8;
  bool jailed = 9;
}

message CommissionHistoryEntry {
  string validator_address = 1;
  uint64 height = 2;
  uint32 base_commission_bps = 3;
  uint32 effective_commission_bps = 4;
  int32 performance_modifier_bps = 5;
  int32 reputation_modifier_bps = 6;
  bool jailed = 7;
  string reason = 8;
}
